<mat-form-field appearance="outline" class="form-field">
    <input 
        class="form-input" 
        matInput 
        type = "text" 
        [ngModel]="newTaskText()" 
        (ngModelChange)="newTaskText.set($event)"
        placeholder="Add your new ToDo">
</mat-form-field>

<button class="button button--add" 
    [disabled] = isDisabled()
    (click)="onItemAdded()">Add task
</button>
