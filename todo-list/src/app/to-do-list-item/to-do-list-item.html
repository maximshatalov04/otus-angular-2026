<button 
    [appTooltip]="item()?.description" 
    class="list-item-task"
    (click)="onItemSelected(item()?.id)">
    <span >{{ item()?.text }}</span>
</button>
<app-templated-button 
    appTooltip="Delete task"
    class="button button--delete"
    bgColor="transparent"
    (clicked)="onItemDeleted(item()?.id)" 
    >
    <span class="delete-icon">
        <mat-icon style="color:#f44336;">highlight_off</mat-icon>
    </span>
</app-templated-button>
