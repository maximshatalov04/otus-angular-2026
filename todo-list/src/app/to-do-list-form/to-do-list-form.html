<mat-form-field appearance="outline" class="form-field">
    <input 
        class="form-input" 
        matInput 
        type = "text" 
        [ngModel]="newTaskText()" 
        (ngModelChange)="newTaskText.set($event)"
        placeholder="Add your new ToDo">
</mat-form-field>

<app-templated-button class="button button--add" 
    [isDisabled]="isInputEmpty()"
    (clicked)="onItemAdded()"
    [bgColor]="'#45c86a'">
        <span class="add-icon">
        <mat-icon>add</mat-icon>
    </span>
</app-templated-button>
